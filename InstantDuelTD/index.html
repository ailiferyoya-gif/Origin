<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101827">
    <title>Instant Duel TD</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css?v=20260608-pages">
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <p class="eyebrow">INSTANT DUEL TD</p>
          <strong id="roomCode">----</strong>
        </div>
        <button id="shareBtn" type="button">共有</button>
      </section>

      <section class="scoreline">
        <div class="meter enemy"><span>相手HP</span><b id="enemyHp">20</b></div>
        <div class="meter self"><span>自分HP</span><b id="selfHp">20</b></div>
        <div class="gold"><span>資源</span><b id="gold">0</b></div>
      </section>

      <section class="arenaWrap">
        <canvas id="arena" width="360" height="620"></canvas>
        <div id="status" class="status">接続準備中</div>
      </section>

      <section class="controls">
        <div class="tabs">
          <button class="tab active" id="towerTab" type="button">タワー</button>
          <button class="tab" id="enemyTab" type="button">敵を送る</button>
        </div>
        <div class="rerollRow">
          <button id="rerollBtn" type="button">引き直す</button>
          <span id="rerollCount">残り 3</span>
        </div>
        <div id="cards" class="cards"></div>
      </section>
    </main>

    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script src="./app.js?v=20260608-pages" type="module"></script>
  </body>
</html>
