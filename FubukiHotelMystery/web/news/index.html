<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>新聞切り抜き</title><link rel="stylesheet" href="../site.css"></head><body class="paper"><header class="wrap topbar"><a class="brand" href="../explore/index.html">館内探索</a><a href="../index.html">入口へ</a></header><main class="wrap"><section class="panel"><h1>ロビー掲示板の新聞切り抜き</h1><h2>吹雪ホテル前オーナー、閉館整理中に行方不明</h2><p>二十四日深夜、吹雪ホテルの前オーナー蓮見岳さんが行方不明となった。ホテル側は「閉館整理の混乱により屋外へ出た可能性」と説明。同行していた司法書士の鳥居真琴さんは「蓮見さんは西階段へ向かった」と証言している。</p><p>一方で、ホテル従業員の一人は本紙に「外へ出るには発電機室横の外扉を開ける必要があり、西階段から直接外へは出られない」と話した。</p></section></main><script src="../textflow.js"></script></body></html>
