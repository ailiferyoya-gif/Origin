<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>非常時案内</title><link rel="stylesheet" href="../../site.css"></head><body class="doc"><header class="wrap topbar"><a class="brand" href="../index.html">公式資料</a><a href="../../index.html">入口へ</a></header><main class="wrap"><section class="panel"><h1>停電時の案内</h1><ol><li>二十三時四十分以降、非常灯が赤へ切り替わる。</li><li>宿泊客は東階段からロビーへ誘導する。</li><li>西階段は防火扉が閉じるため、従業員通路から発電機室へ向かう。</li><li>発電機室の復旧確認後、外扉を手動解錠する。</li></ol><p>発電機室の鍵は管理室の鍵箱に保管。マスターキーを持ち出した場合、サービス記録に持出者名を残す。</p></section><section class="panel"><h2>避難経路掲示</h2><p>公開掲示では西階段を使わない。にもかかわらず、事故夜の内部ログには西階段で二度だけ開閉信号が残る。</p></section></main><script src="../../textflow.js"></script></body></html>
