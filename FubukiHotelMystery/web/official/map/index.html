<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>館内図</title><link rel="stylesheet" href="../../site.css"></head><body class="doc"><header class="wrap topbar"><a class="brand" href="../index.html">公式資料</a><a href="../../index.html">入口へ</a></header><main class="wrap"><section class="panel"><h1>館内図</h1><p>本館と西館は二階廊下で接続している。停電時に開くのは東階段と従業員通路で、西階段は防火扉の自動閉鎖対象と記載されている。</p><div class="map"><div class="floor"><strong>4F</strong><div class="room">401 書庫</div><div class="room">402 閉鎖客室</div><div class="room">403 屋根裏前室</div><div class="room">西階段上端</div></div><div class="floor"><strong>3F</strong><div class="room">301 蓮見旧室</div><div class="room">302 空室</div><div class="room">307 旧従業員控室</div><div class="room">西階段踊場</div></div><div class="floor"><strong>2F</strong><div class="room">201 鳥居真琴</div><div class="room">203 乾燥室横</div><div class="room">サービスリフト</div><div class="room">従業員通路</div></div><div class="floor"><strong>1F</strong><div class="room">ロビー</div><div class="room">暖炉</div><div class="room">発電機室</div><div class="room">東階段</div></div></div></section><section class="panel"><h2>保全メモ</h2><p>二階の乾燥室から従業員通路へ入る扉は、停電時に手動解錠できる。鍵箱には通常、マスターキーが一本だけ保管される。</p></section></main><script src="../../textflow.js"></script></body></html>
