<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>宿泊者ノート</title><link rel="stylesheet" href="../site.css"></head><body class="doc"><header class="wrap topbar"><a class="brand" href="../explore/index.html">館内探索</a><a href="../index.html">入口へ</a></header><main class="wrap"><section class="panel"><h1>ロビーの宿泊者ノート</h1><article class="panel"><h2>12/25 00:31 眠れない客</h2><p>停電のあと、黒いコートの人が二階の乾燥室から出てきた。外へ出るならロビーのはずなのに、従業員通路の方へ消えた。</p></article><article class="panel"><h2>12/25 00:44 西館が見える部屋</h2><p>三階の非常灯が一つだけ点いて、307のタグみたいなものを持った人影が見えた。顔は見えない。鍵を落とした音がした。</p></article></section></main><script src="../textflow.js"></script></body></html>
