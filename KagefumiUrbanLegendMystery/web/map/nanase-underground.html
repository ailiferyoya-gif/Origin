      <h1>旧第三連絡道とC2出口</h1>
      <p class="lead">七瀬駅東口から商店街へ抜ける地下歩道の案内。</p>
      <p>旧第三連絡道は、東七瀬駅東口から七瀬通り商店街へ抜ける短い地下歩道です。C2出口はミナミマート七瀬通り店の裏手にあり、夜間は人通りが少なくなります。</p><p>地域で語られる『影踏み電話』は、このC2出口付近の公衆電話と結びつけられています。ただし現在の現地案内では、電話機は撤去済みです。</p>
      <dl class="fact-box"><div><dt>C2出口</dt><dd>ミナミマート裏手</dd></div><div><dt>電話機</dt><dd>撤去済み</dd></div></dl>
