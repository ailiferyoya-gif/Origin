      <h1>東七瀬駅 夜間案内放送の一時停止について</h1>
      <p class="lead">東七瀬駅東口の案内放送が一時停止した件について。</p>
      <p>6月12日23時10分から23時18分まで、東七瀬駅東口の案内放送が一時停止した。駅設備の記録では、駅東口の時刻同期が4分進んでいたため、商店街側の防犯映像とは表示時刻に差がある。</p><p>お問い合わせの多い『23時17分の呼び出し音』は、駅構内放送の復旧確認音が地下歩道に反響した可能性が高い。</p>
      <dl class="fact-box"><div><dt>時刻同期</dt><dd>4分進み</dd></div><div><dt>復旧確認音</dt><dd>呼び出し音の元</dd></div></dl>
    </div>
