<script>
const data = [{"title":"七瀬通りで広がる「影踏み電話」 23時17分の噂を検証","site":"東区タイムズ","url":"../news/2009-0718-shadow-phone.html","text":"七瀬通りで広がる「影踏み電話」 23時17分の噂を検証 深夜の地下歩道に残る公衆電話をめぐり、通話後に影を踏まれるという噂が中高生の間で広がっている。 七瀬通りの旧第三連絡道にある公衆電話について、23時17分に受話器を上げると自分の声が返ってくるという噂が広がっている。市は「施設点検の対象外になった電話機ではない」と説明しているが、現地では週末の夜に写真を撮る若者が増えている。 噂の発端は、平成21年6月12日の夜に投稿された短い書き込みとされる。投稿者は、地下歩道C2出口の近くで呼び出し音を聞いたと記していた。 噂の時刻: 23:17 場所名: 旧第三連絡道 関連出口: C2"},{"title":"南七瀬公園で清掃活動 参加者120人","site":"東区タイムズ","url":"../news/2010-park-cleanup.html","text":"南七瀬公園で清掃活動 参加者120人 町内会と中学校が合同で清掃活動を実施。 南七瀬公園と周辺水路で、春の清掃活動が行われた。地域の子ども会や商店会も参加し、歩道の落ち葉や水路沿いのごみを回収した。 "},{"title":"七瀬駅前に小型商業施設 来月開業","site":"東区タイムズ","url":"../news/2011-mall-open.html","text":"七瀬駅前に小型商業施設 来月開業 駅前再開発の第一期として、小型商業施設が開業する。 東七瀬駅前の空き地に、小型商業施設が来月開業する。市は歩行者導線の改善に合わせて、駅東側の案内板も更新する。 "},{"title":"大雨時の地下歩道利用に注意 七瀬市が呼びかけ","site":"東区タイムズ","url":"../news/2015-rain-safety.html","text":"大雨時の地下歩道利用に注意 七瀬市が呼びかけ 市内の地下歩道で排水設備の確認が行われた。 七瀬市は大雨時の地下歩道利用について注意を呼びかけている。旧第三連絡道は排水性能に問題はないが、夜間は照明点検のため一部区画を閉じる場合がある。 "},{"title":"旧第三連絡道 照明設備点検記録","site":"七瀬市公開資料室","url":"../city/doc-20090612-maintenance.html","text":"旧第三連絡道 照明設備点検記録 旧第三連絡道C2出口付近の照明設備点検記録。 旧第三連絡道のC2出口付近で、平成21年6月12日23時13分から23時19分まで照明が不安定になった。通報記録は23時17分として受付処理されたが、点検員の携帯端末時刻では最初の異常は23時13分だった。 同日、七瀬第二中学校の生徒が通学路確認のため同連絡道を通過していたとの連絡が学校から入っている。保護者連絡の都合により、氏名欄は学校資料で確認すること。 実際の異常開始: 23:13 受付処理: 23:17 場所: 旧第三連絡道 C2出口"},{"title":"七瀬駅周辺地下歩道 出入口一覧","site":"七瀬市公開資料室","url":"../city/doc-underground-route-map.html","text":"七瀬駅周辺地下歩道 出入口一覧 七瀬駅周辺地下歩道の出入口番号と管理区分。 旧第三連絡道は、駅東口から七瀬通り商店街へ抜ける歩行者用通路である。C1は駅側、C2は商店街側、C3は水路側出口として管理される。 "},{"title":"南七瀬水路 ガードレール交換予定","site":"七瀬市公開資料室","url":"../city/doc-river-guardrail.html","text":"南七瀬水路 ガードレール交換予定 水路沿いの歩道安全対策に関する資料。 南七瀬水路沿いのガードレール老朽化に伴い、歩道安全対策を実施する。通学時間帯の迂回は発生しない見込み。 "},{"title":"地域掲示板 更新作業のお知らせ","site":"七瀬市公開資料室","url":"../city/doc-bulletin-board.html","text":"地域掲示板 更新作業のお知らせ 自治会掲示板の更新作業に関する案内。 七瀬通り沿いの自治会掲示板を更新する。古い掲示物は町内会館で一定期間保管し、その後廃棄する。 "},{"title":"2009年度 通学路安全確認記録","site":"七瀬第二中学校","url":"../school/history-2009-safety-route.html","text":"2009年度 通学路安全確認記録 大雨時の通学路確認と保護者連絡について。 6月12日夜、部活動後に帰宅した生徒のうち、高瀬奈央さんが旧第三連絡道C2出口付近の照明不調を学校へ連絡した。学校は市の夜間受付へ情報を転送し、翌週の保護者会で通学路確認を行った。 当時の保護者配布資料では、生徒の不安を避けるため、連絡者名は公開資料から外した。校内控えでは『高瀬奈央 / C2 / 23:13』として保存されている。 連絡者: 高瀬奈央 控え: 高瀬奈央 / C2 / 23:13"},{"title":"写真部 地域記録展のお知らせ","site":"七瀬第二中学校","url":"../school/club-news-2009.html","text":"写真部 地域記録展のお知らせ 写真部が七瀬通りの風景を展示。 写真部は秋の文化祭で、七瀬通りの夜景や駅周辺の風景を展示する。展示写真は学校外への持ち出しを禁止している。 "},{"title":"PTA通学路点検 2012年度まとめ","site":"七瀬第二中学校","url":"../school/pta-route-2012.html","text":"PTA通学路点検 2012年度まとめ 通学路点検の報告。 PTA通学路点検では、駅前交差点、南七瀬水路、七瀬通り商店街の三箇所を重点確認した。 "},{"title":"学校図書館 地域資料展示","site":"七瀬第二中学校","url":"../school/library-day.html","text":"学校図書館 地域資料展示 地域資料の展示案内。 学校図書館では、七瀬市の昔の地図と地域新聞の縮刷版を展示する。貸出は行わず、館内閲覧のみとする。 "},{"title":"東七瀬駅 夜間案内放送の一時停止について","site":"東七瀬交通","url":"../rail/notice-20090612-east-nanase.html","text":"東七瀬駅 夜間案内放送の一時停止について 東七瀬駅東口の案内放送が一時停止した件について。 6月12日23時10分から23時18分まで、東七瀬駅東口の案内放送が一時停止した。駅設備の記録では、駅東口の時刻同期が4分進んでいたため、商店街側の防犯映像とは表示時刻に差がある。 お問い合わせの多い『23時17分の呼び出し音』は、駅構内放送の復旧確認音が地下歩道に反響した可能性が高い。 時刻同期: 4分進み 復旧確認音: 呼び出し音の元"},{"title":"拾得物のお知らせ 黒い雨具","site":"東七瀬交通","url":"../rail/lost-property-umbrella.html","text":"拾得物のお知らせ 黒い雨具 東七瀬駅で黒い雨具が届けられました。 6月13日朝、東七瀬駅東口で黒い雨具が届けられました。お心当たりの方は駅窓口までお問い合わせください。 "},{"title":"東七瀬駅 東口案内板を更新します","site":"東七瀬交通","url":"../rail/station-renewal.html","text":"東七瀬駅 東口案内板を更新します 東口案内板更新のお知らせ。 東七瀬駅東口の案内板を更新します。周辺施設、地下歩道、バス停の表示を見直します。 "},{"title":"防犯カメラ時刻表示の修正について","site":"ミナミマート七瀬通り店","url":"../store/notice-camera-clock.html","text":"防犯カメラ時刻表示の修正について 七瀬通り店の防犯カメラ時刻表示を修正しました。 ミナミマート七瀬通り店では、6月12日夜の記録確認時、防犯カメラの表示時刻が実時刻より4分進んでいたことを確認しました。23:17と表示された映像は、実時刻では23:13の記録です。 当該映像には、店舗前を通過する生徒と、地下歩道C2出口側へ向かう黒い雨具の人物が映っていました。警察への提供後、個人が特定される映像は公開していません。 23:17表示 = 実時刻23:13 C2出口側へ向かった人物"},{"title":"夏のポイントフェア","site":"ミナミマート七瀬通り店","url":"../store/summer-fair.html","text":"夏のポイントフェア 夏季ポイントフェアのお知らせ。 七瀬通り店では、夏季ポイントフェアを実施します。対象商品をお買い上げの方に追加ポイントを付与します。 "},{"title":"雨具売場を拡大しました","site":"ミナミマート七瀬通り店","url":"../store/rain-goods.html","text":"雨具売場を拡大しました 梅雨時期の雨具売場拡大のお知らせ。 傘、レインコート、防水バッグの売場を拡大しました。駅をご利用のお客様にも便利です。 "},{"title":"旧第三連絡道とC2出口","site":"七瀬まち歩きガイド","url":"../map/nanase-underground.html","text":"旧第三連絡道とC2出口 七瀬駅東口から商店街へ抜ける地下歩道の案内。 旧第三連絡道は、東七瀬駅東口から七瀬通り商店街へ抜ける短い地下歩道です。C2出口はミナミマート七瀬通り店の裏手にあり、夜間は人通りが少なくなります。 地域で語られる『影踏み電話』は、このC2出口付近の公衆電話と結びつけられています。ただし現在の現地案内では、電話機は撤去済みです。 C2出口: ミナミマート裏手 電話機: 撤去済み"},{"title":"南七瀬水路の夜道","site":"七瀬まち歩きガイド","url":"../map/south-canal.html","text":"南七瀬水路の夜道 水路沿いの散策路と夜間注意。 南七瀬水路沿いは昼間の散策に適した道ですが、夜間は街灯が少ないため大通りの利用をおすすめします。 "},{"title":"東七瀬駅東口","site":"七瀬まち歩きガイド","url":"../map/station-east.html","text":"東七瀬駅東口 駅東口の乗換案内。 東七瀬駅東口にはバス停、タクシー乗り場、地下歩道入口があります。C1出口から地下歩道へ入れます。 "},{"title":"【保存】七瀬通りの電話って本当に鳴るの？","site":"七瀬ローカルログ","url":"../board/thread-shadow-phone-2009.html","text":"【保存】七瀬通りの電話って本当に鳴るの？ 地域掲示板の保存ログ。 43: 23:17に鳴るって話、駅の放送と混ざってるだけじゃない？ C2の下で聞くと電話っぽく聞こえる。 51: 名前は出すなって言われてるけど、学校の子が市に連絡したらしい。消えたとかじゃなくて、黒い雨具の人を見たって話。 68: 『影踏み』って、地下歩道の照明が落ちて足元の影が前後にずれたからだろ。電話は後から付いた。 噂化: 駅放送 + 照明不調 黒い雨具の人物 消失ではなく目撃"},{"title":"七瀬二中の帰り道ルール","site":"七瀬ローカルログ","url":"../board/thread-school-rumor.html","text":"七瀬二中の帰り道ルール 通学路に関する雑談ログ。 七瀬二中では、雨の日は駅前地下歩道を避けるように言われていた時期がある。実際には防犯上の理由だったという投稿が多い。 "},{"title":"東七瀬駅の夜の音","site":"七瀬ローカルログ","url":"../board/thread-station-sounds.html","text":"東七瀬駅の夜の音 駅周辺の音に関する雑談。 夜間の案内放送や踏切音が地下歩道に反響して、電話の呼び出し音のように聞こえるという投稿があった。 "},{"title":"七瀬通り花壇コンクール 結果発表","site":"東区タイムズ","url":"../news/2018-flowers.html","text":"七瀬通り花壇コンクール 結果発表 商店街の花壇コンクールが行われ、駅前北口チームが最優秀賞を受賞した。"},{"title":"移動図書館の巡回日を変更","site":"東区タイムズ","url":"../news/2020-library-bus.html","text":"移動図書館の巡回日を変更 七瀬市立図書館は移動図書館の巡回日を一部変更する。"},{"title":"南七瀬水路沿いで健康ウォーク","site":"東区タイムズ","url":"../news/2022-canal-run.html","text":"南七瀬水路沿いで健康ウォーク 地域の健康づくりイベントとして、南七瀬水路沿いを歩く催しが行われた。"},{"title":"生活騒音相談 月次まとめ","site":"七瀬市公開資料室","url":"../city/doc-noise.html","text":"生活騒音相談 月次まとめ 市民相談窓口に寄せられた生活騒音相談の月次集計。"},{"title":"街路灯LED化計画","site":"七瀬市公開資料室","url":"../city/doc-light-led.html","text":"街路灯LED化計画 七瀬通り周辺の街路灯を順次LED化する計画。"},{"title":"大雨時避難経路マップ","site":"七瀬市公開資料室","url":"../city/doc-rain-map.html","text":"大雨時避難経路マップ 大雨時の避難経路と注意箇所をまとめた資料。"},{"title":"体育祭の実施について","site":"七瀬第二中学校","url":"../school/sports-day.html","text":"体育祭の実施について 雨天時は体育館で短縮実施します。"},{"title":"卒業証書授与式のご案内","site":"七瀬第二中学校","url":"../school/graduation.html","text":"卒業証書授与式のご案内 卒業証書授与式の日程と受付時間のお知らせ。"},{"title":"購買部メニュー更新","site":"七瀬第二中学校","url":"../school/canteen.html","text":"購買部メニュー更新 購買部のパン販売メニューを更新しました。"},{"title":"IC改札機更新のお知らせ","site":"東七瀬交通","url":"../rail/ticket-gate.html","text":"IC改札機更新のお知らせ 東七瀬駅のIC改札機を更新します。"},{"title":"バス乗換案内を更新しました","site":"東七瀬交通","url":"../rail/bus-transfer.html","text":"バス乗換案内を更新しました 駅東口のバス乗換案内を更新しました。"},{"title":"拾得物のお知らせ パスケース","site":"東七瀬交通","url":"../rail/lost-passcase.html","text":"拾得物のお知らせ パスケース パスケースが届けられています。"},{"title":"店内焼きパンを始めました","site":"ミナミマート七瀬通り店","url":"../store/new-bread.html","text":"店内焼きパンを始めました 毎朝焼き上げるパンの販売を開始しました。"},{"title":"駐車場ライン工事のお知らせ","site":"ミナミマート七瀬通り店","url":"../store/parking.html","text":"駐車場ライン工事のお知らせ 駐車場の白線工事を実施します。"},{"title":"資源回収ボックス移設","site":"ミナミマート七瀬通り店","url":"../store/recycle.html","text":"資源回収ボックス移設 資源回収ボックスを店舗裏手へ移設しました。"},{"title":"七瀬通り商店街","site":"七瀬まち歩きガイド","url":"../map/shopping-street.html","text":"七瀬通り商店街 昔ながらの商店と新しいカフェが並ぶ通り。"},{"title":"水路の古い橋","site":"七瀬まち歩きガイド","url":"../map/old-bridge.html","text":"水路の古い橋 水路沿いに残る小さな橋。"},{"title":"南七瀬公園","site":"七瀬まち歩きガイド","url":"../map/park.html","text":"南七瀬公園 住宅街にある小さな公園。"},{"title":"七瀬駅前の猫を見た","site":"七瀬ローカルログ","url":"../board/thread-cats.html","text":"七瀬駅前の猫を見た 駅前で見かける猫についての雑談ログ。"},{"title":"七瀬周辺のラーメン店","site":"七瀬ローカルログ","url":"../board/thread-best-ramen.html","text":"七瀬周辺のラーメン店 地域の飲食店に関する雑談ログ。"},{"title":"昔の七瀬通り写真","site":"七瀬ローカルログ","url":"../board/thread-old-photos.html","text":"昔の七瀬通り写真 古い写真を見つけたという投稿の保存ログ。"},{"title":"東区タイムズ","site":"サイト","url":"../news/index.html","text":"東区タイムズ 地域ニュース"},{"title":"七瀬市公開資料室","site":"サイト","url":"../city/index.html","text":"七瀬市公開資料室 自治体資料"},{"title":"七瀬第二中学校","site":"サイト","url":"../school/index.html","text":"七瀬第二中学校 学校沿革と保護者向け情報"},{"title":"東七瀬交通","site":"サイト","url":"../rail/index.html","text":"東七瀬交通 駅と路線のお知らせ"},{"title":"ミナミマート七瀬通り店","site":"サイト","url":"../store/index.html","text":"ミナミマート七瀬通り店 店舗案内と地域連絡"},{"title":"七瀬まち歩きガイド","site":"サイト","url":"../map/index.html","text":"七瀬まち歩きガイド 地域ガイド"},{"title":"七瀬ローカルログ","site":"サイト","url":"../board/index.html","text":"七瀬ローカルログ 掲示板保存ログ"}];
const params = new URLSearchParams(location.search);
const q = document.getElementById("q");
const results = document.getElementById("results");
if (params.get("q")) q.value = params.get("q");
function norm(s){ return (s || "").toLowerCase().replace(/\s+/g, ""); }
function run(){
  const query = q.value.trim();
  const nq = norm(query);
  if(!query){ results.innerHTML = '<p class="empty">検索語を入力してください。</p>'; return; }
  const words = query.split(/\s+/).filter(Boolean).map(norm);
  const hits = data.map(item => {
    const nt = norm(item.text);
    let score = 0;
    words.forEach(w => { if(nt.includes(w)) score += 3; });
    if(nt.includes(nq)) score += 6;
    return { ...item, score };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score).slice(0, 12);
  history.replaceState(null, "", "?q=" + encodeURIComponent(query));
  results.innerHTML = hits.length ? hits.map(h => '<a class="result" href="'+h.url+'"><span>'+h.site+'</span><strong>'+h.title+'</strong><p>'+h.text.slice(0, 120)+'...</p></a>').join("") : '<p class="empty">一致する地域情報は見つかりませんでした。</p>';
}
document.getElementById("searchForm").addEventListener("submit", e => { e.preventDefault(); run(); });
run();
</script>
