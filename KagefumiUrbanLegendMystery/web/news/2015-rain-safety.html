      <h1>大雨時の地下歩道利用に注意 七瀬市が呼びかけ</h1>
      <p class="lead">市内の地下歩道で排水設備の確認が行われた。</p>
      <p>七瀬市は大雨時の地下歩道利用について注意を呼びかけている。旧第三連絡道は排水性能に問題はないが、夜間は照明点検のため一部区画を閉じる場合がある。</p>
