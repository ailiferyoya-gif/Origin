      <h1>七瀬駅前に小型商業施設 来月開業</h1>
      <p class="lead">駅前再開発の第一期として、小型商業施設が開業する。</p>
      <p>東七瀬駅前の空き地に、小型商業施設が来月開業する。市は歩行者導線の改善に合わせて、駅東側の案内板も更新する。</p>
