    <h1>館内案内</h1>
    <p>展示室、閲覧室、収蔵庫前室の利用案内です。</p>
  </section>
  <section class="visit-detail">
    <article id="floor1"><h2>第1展示室</h2><p>常設展示と企画展導入部。漁具、生活用具、町内地図を展示しています。</p><a class="text-link" href="../exhibitions.html#permanent">常設展示へ</a></article>
    <article id="floor2"><h2>第2展示室</h2><p>祭礼資料と写真台帳を展示。照明調整中は入室を制限する場合があります。</p><a class="text-link" href="../news.html#news-20260516">照明調整のお知らせ</a></article>
    <article id="storage"><h2>収蔵庫前室</h2><p>講座時のみ公開します。収蔵庫本体への入室はできません。</p><a class="text-link" href="../learning.html#storage-tour">収蔵庫講座へ</a></article>
    <article><h2>閲覧室</h2><p>古文書と台帳の閲覧は予約制です。</p><a class="text-link" href="../safety/index.html#application">閲覧申請へ</a></article>
