      <p class="label">掲載日: 2006年9月16日</p>
      <h2>未明港第二倉庫前道路 夜間通行止め</h2>
      <p>港湾広場での式典準備に伴い、第二倉庫前道路を下記の時間帯で通行止めとします。</p>
      <table>
        <tr><th>日時</th><td>2006年9月17日 18時00分から21時30分</td></tr>
        <tr><th>対象</th><td>第二倉庫前道路、旧資料館裏手通路、港湾広場東側階段</td></tr>
        <tr><th>備考</th><td>歩行者は北回りの図書館前通路を利用してください。</td></tr>
      </table>
      <p>この時間帯は未明高校方面から港へ抜ける近道が使えません。</p>
