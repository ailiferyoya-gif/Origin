      <p><strong>質問</strong> 旧資料館第三展示室に展示されていた、未明港の灯台計画資料を見たい。</p>
      <p><strong>回答</strong> 第三展示室は2006年9月12日より閉室。展示目録は教育委員会に照会中。関連資料としてK-29を案内。</p>
      <p><strong>担当メモ</strong> 相談者は未明高校生。藤代が折り返し連絡予定。連絡方法は「メッセージ不可、電話」。</p>
