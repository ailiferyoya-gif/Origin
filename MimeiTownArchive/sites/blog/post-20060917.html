<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>港の奥だけ明るい</title><link rel="stylesheet" href="../../assets/ui/blog.css"><link rel="stylesheet" href="../../assets/ui/iphone.css"><link rel="manifest" href="../../manifest.webmanifest"><meta name="theme-color" content="#22352c"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"></head><body><main class="blog-wrap"><header class="blog-head"><p>2006年9月17日 19:08</p><h1>港の奥だけ明るい</h1><nav><a href="index.html">ブログトップ</a><a href="comments-archive.html">コメント</a><a href="../weather/log-20060917.html">気象ログ</a><a href="../../search/index.html">未明検索</a></nav></header><article class="post"><img src="../../assets/generated/blog-harbor-light.png" alt="港の奥に見える不自然な灯り" style="width:100%;height:300px;object-fit:cover;border:1px solid #d0c7b8;margin:0 0 16px"><p class="meta">カテゴリ: 町の夜</p><p>夜市の帰り、港の奥だけ変に明るく見えました。式典の準備だと思ったけれど、広場の正面ではなく旧資料館の裏手のほう。</p><p>図書館前から坂を下りる人影が見えた気がします。霧で輪郭は分かりませんでした。</p><p>携帯の写真は暗すぎたので明るさを上げています。奥の白い反射が、灯台の光にしては低すぎるのが気になりました。</p><div class="side-note">追記: コメント欄で「その時間は第二倉庫前が通行止め」と教えてもらいました。</div></article></main><script src="../../assets/ui/iphone.js"></script></body></html>
