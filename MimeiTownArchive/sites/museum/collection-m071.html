      <h2>灯台建設予定地写真</h2>
      <p>昭和34年撮影。未明港東側の丘と旧道を写した写真。計画中止後、資料館へ移管された。</p>
      <p>裏面注記: 「灯台なし。灯だけ残る。港湾広場から見えるのは十八日夜のみ」。</p>
      <p>資料カードの連絡欄には、旧ラジオ番組「灯台波」宛の留守番電話番号が鉛筆で転記されている。末尾は0918。</p>
