      <div>
        <p><strong>未明交通</strong> 9月17日18時以降、港湾広場前停留所は通過します。最寄りは図書館前です。</p>
        <p><strong>浜浦写真館</strong> 記念式典集合写真の焼き増しは9月25日より受付。</p>
        <p><strong>灯台波ラジオ</strong> 今夜23時「港に残る名前」。お便りは留守番電話でも受付。</p>
        <p><strong>未明町立図書館</strong> 郷土資料棚K番台の整理につき、一部資料は職員出納です。</p>
        <p><strong>青浜文具</strong> 文化祭模造紙、色画用紙、油性ペン入荷しました。</p>
        <p><strong>港食堂あけぼの</strong> 式典当日は18時閉店。翌日は通常営業。</p>
