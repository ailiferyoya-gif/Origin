  <main><article class="article-page"><div class="article-meta">町政</div><h2>町職員異動、資料館担当に兼務辞令</h2><p class="lead">未明町教育委員会は十四日付で、郷土資料館の管理担当に兼務辞令を出した。</p><p>第三展示室の資料整理に伴う一時的な措置としている。町は「展示資料の状態確認を目的とした通常の整理」と説明している。</p><p>資料館関係者によると、同室には港湾整備以前の測量図や灯台建設予定地の写真が含まれていた。</p></article></main>
