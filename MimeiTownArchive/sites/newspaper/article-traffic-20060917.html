  <main><article class="article-page"><h2>秋の交通安全運動、港湾地区で出発式</h2><p class="lead">未明警察署と町内会は十七日、秋の交通安全運動を前に港湾地区で出発式を行った。</p><p>夕方以降は霧が出やすく、港湾広場周辺で式典準備も行われるため、関係者は通行経路の確認を呼びかけた。</p></article></main>
