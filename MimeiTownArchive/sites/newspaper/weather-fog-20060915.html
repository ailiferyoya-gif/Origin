  <main><article class="article-page"><div class="article-meta">気象メモ</div><h2>週末は沿岸部で霧、見通し悪化に注意</h2><p class="lead">未明湾では十七日夕方から夜にかけ、海霧が発生しやすい状態が続く見込み。</p><p>港湾地区を通行する歩行者は反射材や灯りを携行し、車両は速度を落とすよう呼びかけている。</p><p>町防災交通係によると、港湾広場では式典準備に伴い仮設照明を使用するため、周辺の見通しが通常と異なる可能性がある。</p></article></main>
