<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#120f16" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="妖札迷宮" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>妖札迷宮</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/img/icon-512.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone" data-screen="setup" aria-live="polite">
      <img class="bg" src="./assets/img/bg-shrine.png" alt="" />
      <div class="shade"></div>
      <div class="particles" aria-hidden="true"></div>
      <section id="setupScreen" class="setup-screen">
        <header class="topbar setup-topbar">
          <span class="icon-button setup-mark" aria-hidden="true">札</span>
          <div class="title">
            <strong>妖札迷宮</strong>
            <span>妖札召喚 開催中</span>
          </div>
          <div id="collectionText" class="currency">所持 0</div>
          <div id="deckCountText" class="currency">札組 0/20</div>
        </header>

        <section class="setup-panel gacha-panel">
          <div class="setup-title">
            <div>
              <span class="label">LIMITED SUMMON</span>
              <strong>百鬼妖札祭</strong>
            </div>
            <span class="rate-chip">SSR 4%</span>
          </div>
          <div class="portal" aria-hidden="true">
            <div class="smoke smoke-a"></div>
            <div class="smoke smoke-b"></div>
            <div class="smoke-ring smoke-ring-a"></div>
            <div class="smoke-ring smoke-ring-b"></div>
            <div class="core">札</div>
          </div>
          <div class="gacha-actions">
            <button id="pullOneButton" type="button">一枚召喚</button>
            <button id="pullTenButton" class="primary-summon" type="button">十連召喚</button>
          </div>
          <div id="gachaResult" class="gacha-result">まずは十連召喚で妖札を集めよう。</div>
        </section>

        <section class="setup-panel deck-panel">
          <div class="setup-title">
            <div>
              <span class="label">編成</span>
              <strong>20枚デッキ</strong>
            </div>
            <button id="autoDeckButton" type="button">自動編成</button>
          </div>
          <div id="deckHint" class="deck-hint">20枚ちょうどで出撃できます。カードを押すとデッキに出し入れできます。</div>
          <div id="deckList" class="deck-list"></div>
          <button id="startRunButton" class="start-run" type="button" disabled>このデッキで探索開始</button>
        </section>
      </section>

      <section id="gameScreen" class="game-screen" hidden>
        <section class="scene" aria-label="探索画面">
          <div class="topbar">
            <div>
              <span class="label">夜</span>
              <strong id="floorText">1 / 10</strong>
            </div>
            <div>
              <span class="label">魂灯</span>
              <strong id="soulText">0</strong>
            </div>
            <button id="restartButton" class="icon-button" type="button" aria-label="編成へ戻る">
              ↺
            </button>
          </div>

          <div class="combat-stage">
            <img class="enemy-art" id="enemyArt" src="./assets/img/yokai.png" alt="妖怪" />
            <div class="intent" id="intentText">様子をうかがっている</div>
            <div class="enemy-panel">
              <div class="name-row">
                <strong id="enemyName">狐面の灯</strong>
                <span id="enemyHpText">HP 34/34</span>
              </div>
              <div class="bar"><span id="enemyHpBar"></span></div>
            </div>
          </div>

          <div class="hero-panel">
            <img class="hero-art" src="./assets/img/hero.png" alt="祓い師" />
            <div class="hero-stats">
              <div class="name-row">
                <strong>祓い師</strong>
                <span id="hpText">HP 42/42</span>
              </div>
              <div class="bar hero"><span id="hpBar"></span></div>
              <div class="status-row">
                <span id="blockText">結界 0</span>
                <span id="burnText">呪火 0</span>
                <span id="deckText">山札 0</span>
              </div>
            </div>
          </div>
        </section>

        <section class="hand-zone" aria-label="妖札">
          <div class="log" id="logText">鳥居の奥から妖気が流れ込む。妖札を選べ。</div>
          <div class="cards" id="cards"></div>
          <div class="actions">
            <button id="restButton" type="button">茶屋で休む</button>
            <button id="advanceButton" type="button" disabled>次の夜へ</button>
          </div>
        </section>
      </section>

      <dialog id="resultDialog">
        <div class="dialog-body">
          <h1 id="resultTitle">探索終了</h1>
          <p id="resultText"></p>
          <button id="dialogRestartButton" type="button">編成へ戻る</button>
        </div>
      </dialog>
    </main>
    <script src="./app.js?v=wafu-cardsheet-20260610"></script>
  </body>
</html>
