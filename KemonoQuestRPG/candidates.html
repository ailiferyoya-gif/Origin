<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ケモノクエスト キャラ候補</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", system-ui, sans-serif;
      background: #111827;
      color: #f8fafc;
    }
    main {
      width: min(100% - 28px, 980px);
      margin: 0 auto;
      padding: 24px 0 40px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
    }
    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.6;
    }
    a {
      color: #67e8f9;
      font-weight: 800;
    }
    .grid {
      display: grid;
      gap: 18px;
    }
    figure {
      margin: 0;
      padding: 12px;
      border: 2px solid #334155;
      border-radius: 8px;
      background: #f1f5f9;
      color: #111827;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
    }
    figcaption {
      margin-top: 8px;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <h1>ケモノクエスト キャラ候補</h1>
    <p><a href="./index.html">ゲーム確認ページへ</a></p>
    <section class="grid" aria-label="キャラクター候補">
      <figure>
        <img src="candidates/tall-female-sheet.png" alt="高頭身の女性キャラクター候補3案">
        <figcaption>高頭身候補: 女性のみ / 3キャラ</figcaption>
      </figure>
      <figure>
        <img src="candidates/vivid-noears-sheet.png" alt="獣耳なしで生成したビビッドな新規キャラ候補5案">
        <figcaption>新規候補: 獣耳なし / 5キャラ</figcaption>
      </figure>
      <figure>
        <img src="candidates/a-body-red-eyes-sheet.png" alt="Aの体に赤い目を合わせた主人公候補3案">
        <figcaption>主人公候補: A体 + 赤目</figcaption>
      </figure>
      <figure>
        <img src="candidates/party-red-eye-sheet.png" alt="同じ画風で生成した仲間キャラ候補3案">
        <figcaption>仲間候補: Guardian / Spellcaster / Rogue</figcaption>
      </figure>
      <figure>
        <img src="candidates/mix-1body-3face-sheet.png" alt="1の体と3の顔を混ぜた候補3案">
        <figcaption>過去案: 1の体 + 3の顔</figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
