<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kemono Quest Raid</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone" aria-label="Kemono Quest Raid">
    <section class="topbar">
      <div>
        <p class="eyebrow">Idle Co-op Raid</p>
        <h1>ケモノクエスト レイド</h1>
      </div>
      <div class="wallet">
        <span id="roomCode">ROOM ----</span>
        <strong><span id="crystals">0</span> 輝晶</strong>
      </div>
    </section>

    <section class="raid-panel" aria-label="レイドボス">
      <div class="boss-frame">
        <div class="boss-aura" aria-hidden="true"></div>
        <img src="assets/boss-vivid-raid.png" alt="幻彩核獣プリズマロア" class="boss-art">
      </div>
      <div class="boss-info">
        <div>
          <p class="eyebrow">Raid Boss</p>
          <h2>幻彩核獣プリズマロア</h2>
        </div>
        <span id="bossLevel" class="pill">Lv 1</span>
      </div>
      <div class="hp-row">
        <div class="hp-track"><span id="bossHpBar"></span></div>
        <p id="bossHpText">HP 0 / 0</p>
      </div>
      <div class="raid-stats">
        <div><span>DPS</span><strong id="partyDps">0</strong></div>
        <div><span>討伐予測</span><strong id="eta">--:--</strong></div>
        <div><span>貢献</span><strong id="contribution">0</strong></div>
      </div>
    </section>

    <section class="party-strip" aria-label="編成中キャラ">
      <div class="section-head">
        <h2>出撃編成</h2>
        <button id="openFormation" class="ghost">編成</button>
      </div>
      <div id="partySlots" class="party-slots"></div>
    </section>

    <section class="command-grid" aria-label="操作">
      <button id="claimReward">報酬受取</button>
      <button id="openGacha" class="secondary">ガチャ</button>
      <button id="openUpgrade" class="secondary">強化</button>
      <button id="copyRoom" class="secondary">部屋URL</button>
    </section>

    <section class="activity-panel" aria-label="レイドログ">
      <div class="section-head">
        <h2>レイド進行</h2>
        <span id="idleState" class="pill">放置中</span>
      </div>
      <div id="raidLog" class="raid-log" aria-live="polite"></div>
    </section>
  </main>

  <dialog id="formationModal" class="modal">
    <div class="modal-head">
      <div>
        <p class="eyebrow">Party</p>
        <h2>3人を選ぶ</h2>
      </div>
      <button class="icon-button" data-close="formationModal" aria-label="閉じる">×</button>
    </div>
    <div id="formationList" class="character-list"></div>
  </dialog>

  <dialog id="gachaModal" class="modal">
    <div class="modal-head">
      <div>
        <p class="eyebrow">Gacha</p>
        <h2>Diverse 5召喚</h2>
      </div>
      <button class="icon-button" data-close="gachaModal" aria-label="閉じる">×</button>
    </div>
    <div id="gachaResult" class="result-card">
      <p>チケットか輝晶で召喚できます。</p>
    </div>
    <div class="modal-actions">
      <button id="pullOnce">1回召喚</button>
      <button id="pullTen" class="secondary">5回召喚</button>
    </div>
  </dialog>

  <dialog id="upgradeModal" class="modal">
    <div class="modal-head">
      <div>
        <p class="eyebrow">Training</p>
        <h2>キャラ強化</h2>
      </div>
      <button class="icon-button" data-close="upgradeModal" aria-label="閉じる">×</button>
    </div>
    <div id="upgradeList" class="character-list"></div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
