<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ケモノクエスト</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone">
    <section class="topbar">
      <div>
        <h1>ケモノクエスト</h1>
        <p>クラシックRPGプロトタイプ</p>
      </div>
      <div class="wallet">
        <span id="level">Lv 1</span>
        <span id="gold">23 G</span>
      </div>
    </section>

    <section class="field-panel">
      <div class="hero-row">
        <img src="assets/hero.png" alt="主人公ルル" class="hero-art">
        <div class="status">
          <strong id="heroName">ルル</strong>
          <label>HP <span id="hpText">34/34</span><meter id="hpMeter" min="0" max="34" value="34"></meter></label>
          <label>MP <span id="mpText">12/12</span><meter id="mpMeter" min="0" max="12" value="12"></meter></label>
        </div>
      </div>
      <div id="map" class="map" aria-label="フィールドマップ"></div>
    </section>

    <section class="controls">
      <div class="dpad">
        <button data-move="0,-1">▲</button>
        <div>
          <button data-move="-1,0">◀</button>
          <button id="inspect">調べる</button>
          <button data-move="1,0">▶</button>
        </div>
        <button data-move="0,1">▼</button>
      </div>
      <button id="battleStart" class="secondary">たたかう</button>
    </section>

    <section id="log" class="log" aria-live="polite"></section>
  </main>

  <dialog id="dialogue" class="modal">
    <h2 id="dialogueTitle">会話</h2>
    <p id="dialogueText"></p>
    <button id="dialogueClose">OK</button>
  </dialog>

  <dialog id="battle" class="modal battle">
    <h2 id="enemyName">かげウルフ</h2>
    <p id="enemyHp">HP 28 / 28</p>
    <div class="battle-actions">
      <button id="attack">こうげき</button>
      <button id="spark">きらめき</button>
      <button id="guard">ぼうぎょ</button>
    </div>
    <div id="battleLog" class="log compact"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
