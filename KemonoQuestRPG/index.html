<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kemono Quest Raid</title>
  <link rel="stylesheet" href="styles.css?v=7324e2f">
</head>
<body>
  <main class="phone" data-screen="village">
    <div class="bg"></div>
    <div class="shade"></div>
    <div class="particles" aria-hidden="true"></div>
    <div id="flash" class="flash" aria-hidden="true"></div>

    <header class="topbar">
      <button id="backButton" class="icon" aria-label="戻る">‹</button>
      <div class="title">
        <strong id="screenTitle">ケモノクエスト</strong>
        <span id="screenSubtitle">冒険者ギルド / 放置レイド</span>
      </div>
      <button id="soundToggle" class="icon sound-on" aria-label="効果音">♪</button>
      <div id="ticketCurrency" class="currency">契約 3</div>
      <div id="crystalCurrency" class="currency">輝晶 260</div>
    </header>

    <nav class="tabs" aria-label="Game sections">
      <button class="tab active" data-tab="village"><img src="assets/generated/ui/guild.png" alt=""><span>ギルド</span></button>
      <button class="tab" data-tab="characters"><img src="assets/generated/ui/characters.png" alt=""><span>仲間</span></button>
      <button class="tab" data-tab="formation"><img src="assets/generated/ui/party.png" alt=""><span>編成</span></button>
      <button class="tab" data-tab="equipment"><img src="assets/generated/ui/equipment.png" alt=""><span>装備</span></button>
      <button class="tab" data-tab="missions"><img src="assets/generated/ui/quest.png" alt=""><span>クエスト</span></button>
      <button class="tab" data-tab="gacha"><img src="assets/generated/ui/summon.png" alt=""><span>召喚</span></button>
      <button class="tab" data-tab="save"><img src="assets/generated/ui/save.png" alt=""><span>記録</span></button>
    </nav>

    <section id="villagePanel" class="game-panel"></section>
    <section id="charactersPanel" class="game-panel" hidden></section>
    <section id="formationPanel" class="game-panel" hidden></section>
    <section id="equipmentPanel" class="game-panel" hidden></section>
    <section id="missionsPanel" class="game-panel" hidden></section>
    <section id="savePanel" class="game-panel" hidden></section>

    <section id="gachaStage" class="stage" hidden>
      <div class="portal" aria-hidden="true">
        <div class="smoke smoke-a"></div>
        <div class="smoke smoke-b"></div>
        <div class="smoke-ring smoke-ring-a"></div>
        <div class="smoke-ring smoke-ring-b"></div>
        <div class="core">契</div>
      </div>
      <p id="caption" class="portal-caption">契約陣に魔晶光を集める</p>
      <button id="summon" class="summon"><img src="assets/generated/ui/summon.png" alt="">5回召喚<b>契約書1 / 輝晶400</b></button>
      <div class="rates">
        <span>攻撃 <b>多め</b></span>
        <span>支援 <b>安定</b></span>
        <span>未入手補正 <b>あり</b></span>
      </div>
    </section>

    <section id="results" class="results" hidden>
      <h1>召喚結果</h1>
      <div class="grid"></div>
      <button id="again" class="continue">もう一度召喚</button>
    </section>

    <section id="newGet" class="new-get" hidden>
      <div class="new-get-copy">
        <span>契約成立</span>
        <strong>Silver Bell</strong>
        <em>回復 / 月鐘の祈り</em>
      </div>
      <img class="new-get-hero" src="candidates/diverse5-silver-bell.png" alt="">
      <button id="newGetNext" class="new-get-next">結果を見る</button>
    </section>

    <section id="confirmModal" class="modal" hidden>
      <div class="modal-card">
        <span id="confirmKicker" class="scene-kicker">確認</span>
        <h2 id="confirmTitle">確認</h2>
        <p id="confirmBody"></p>
        <div id="confirmDetails" class="modal-details"></div>
        <div class="modal-actions">
          <button id="confirmCancel">戻る</button>
          <button id="confirmOk">実行</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js?v=7324e2f"></script>
</body>
</html>
