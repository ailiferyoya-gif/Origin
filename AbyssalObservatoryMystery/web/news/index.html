<div class="mast">港湾日報 縮刷版</div><main class="wrap site-main"><article><p class="small">2014/11/19 / 社会</p><h1>海底観測施設で研究員死亡</h1><p>湊浦市は18日深夜、黒潮海底観測所で三枝透さんが死亡したと発表した。市は設備故障の可能性があるとしている。</p><p>関係者によると、事故番号はOBS-1118として処理された。</p></article><article><p class="small">2014/11/20 / 訂正</p><h1>休職扱いの表現について</h1><p>19日付記事の人事処理に関する表現は、市の公開資料に合わせ休職扱いとします。</p></article><article><p class="small">2014/12/01 / 地域</p><h1>閉鎖施設の資料公開へ</h1><p>深度ログ第七冊など一部資料は閲覧制限となる。</p></article></main>
