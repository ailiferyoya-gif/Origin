<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="インタビューページ。全員でという質問に6人だけ回答。">
  <rect width="1200" height="760" fill="#eee9e0"/>
  <rect x="92" y="62" width="1016" height="636" rx="12" fill="#fffdf7" stroke="#c8bead"/>
  <text x="150" y="138" font-size="38" font-family="serif" fill="#242b32">Interview: 全員で撮った一枚</text>
  <text x="150" y="196" font-size="20" fill="#6a7178">Q. 全員で最初に写真集を撮ると聞いた時、どう思いましたか。</text>
  <g font-family="sans-serif" font-size="20" fill="#2d343b">
    <text x="150" y="270">朝比奈 玲: まだ実感がなくて、でも嬉しかったです。</text>
    <text x="150" y="330">水瀬 こはる: 楽屋がいつもより静かでした。</text>
    <text x="150" y="390">三澄 奈緒: みんなで確認した衣装表がありました。</text>
    <text x="150" y="450">叶井 すず: 写真になると、空きが目立つんです。</text>
    <text x="150" y="510">橘 ゆめ: この話、掲載していいんでしたっけ。</text>
    <text x="150" y="570">星野 ましろ: もう一度、全員で見たいです。</text>
  </g>
  <text x="830" y="650" font-size="16" fill="#8a8f94">answers: 6 / question: 全員</text>
</svg>
