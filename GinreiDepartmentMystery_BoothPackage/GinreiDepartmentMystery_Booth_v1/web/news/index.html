<div class="mast">北峰日日新聞 縮刷版</div><main class="wrap site-main"><article><p class="small">1998/12/25 / 地域</p><h1>銀嶺百貨店の社員退職</h1><p>銀嶺百貨店は24日、売場主任の宮永梓さんを退職処理としたと発表した。閉店準備の混乱によるものとしている。</p></article><article><p class="small">1998/12/26 / 訂正</p><h1>24日付記事の補足</h1><p>地下設備の不具合について、防災センターの記録確認中とします。</p></article><article><p class="small">1999/01/08 / 経済</p><h1>閉店記念サイト公開</h1><p>館内写真や売上台帳の一部が公開された。第12冊は欠番扱い。</p></article></main>
