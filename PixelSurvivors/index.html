<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#080b13">
  <title>Pixel Survivors</title>
  <link rel="stylesheet" href="./styles.css?v=20260614-roster">
</head>
<body>
  <main class="shell">
    <canvas id="game" aria-label="Pixel Survivors game field"></canvas>
    <section class="hud" aria-label="status">
      <div class="row">
        <span id="hp">HP 6/6</span>
        <span id="time">00:00</span>
      </div>
      <div class="row">
        <span id="level">LV 1</span>
        <span id="kills">KILLS 0</span>
      </div>
      <div class="xp"><span id="xp"></span></div>
    </section>
    <section id="upgrade" class="upgrade hidden" aria-live="polite"></section>
    <section id="prep" class="prep" aria-label="loadout">
      <div class="prep-head">
        <p>PIXEL SURVIVORS</p>
        <h1>&#20986;&#25731;&#28310;&#20633;</h1>
        <div class="wallet"><span id="coins">COIN 0</span><span id="owned">0/0</span></div>
      </div>
      <div class="prep-tabs" role="tablist" aria-label="prep mode">
        <button id="tabLoadout" class="active" type="button">LOADOUT</button>
        <button id="tabGacha" type="button">GACHA</button>
      </div>
      <section id="loadoutView" class="prep-view">
        <div class="panel">
          <div class="panel-title"><span>CHARACTER</span><strong id="selectedCharacter">Hunter</strong></div>
          <div id="characters" class="pick-grid roster"></div>
        </div>
        <div class="panel">
          <div class="panel-title"><span>WEAPON</span><strong id="selectedEquipment">Crossbow</strong></div>
          <div id="equipment" class="pick-grid roster"></div>
        </div>
      </section>
      <section id="gachaView" class="prep-view" hidden>
        <div class="panel gacha">
          <div>
            <span>GACHA</span>
            <strong id="gachaResult">100 COIN</strong>
          </div>
          <button id="gachaBtn" type="button">&#22238;&#12377;</button>
        </div>
        <div class="panel">
          <div class="panel-title"><span>PRIZE POOL</span><strong>10 + 20</strong></div>
          <div id="gachaPool" class="prize-grid"></div>
        </div>
      </section>
      <button id="startBtn" class="start" type="button">START</button>
    </section>
    <div id="stick" class="stick" aria-hidden="true"><span></span></div>
  </main>
  <script src="./app.js?v=20260615-iphoneperf"></script>
</body>
</html>
