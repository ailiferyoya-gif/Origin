<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="../">
<title>水守町 防災写真帖 調査ノート</title>
<link rel="stylesheet" href="note/note.css?v=20260530-separated-sites">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <p class="kicker">水守町 防災写真帖 調査ノート</p>
      <h1>写真と公開資料の差分整理</h1>
      <p class="small">このページは写真帖と公開資料を照合するための作業ノートです。</p>
    </div>
    <div class="top-actions">
      <a href="./">写真帖</a>
      <a href="materials/">資料</a>
      <button id="hintToggle" type="button">注記表示 OFF</button>
      <button id="resetBtn" type="button">表示を初期化</button>
    </div>
  </header>

  <main class="layout">
    <section class="album">
      <div class="section-head">
        <h2>写真参照</h2>
        <p id="progressText">0 / 24</p>
      </div>
      <div id="photoGrid" class="photo-grid"></div>
    </section>

    <aside class="side">
      <nav class="tabs" aria-label="閲覧パネル">
        <button class="tab active" data-tab="photo" type="button">写真</button>
        <button class="tab" data-tab="notes" type="button">注記</button>
        <button class="tab" data-tab="docs" type="button">資料</button>
        <button class="tab" data-tab="solve" type="button">照会</button>
      </nav>

      <section class="panel active" data-panel="photo">
        <div class="photo-head">
          <div>
            <h2 id="photoTitle">写真を選んでください</h2>
            <p id="photoCaption">写真を開くと、掲載時の説明と注記対象が表示されます。</p>
          </div>
          <button id="zoomOpen" type="button">拡大</button>
        </div>
        <div class="photo-frame">
          <img id="mainPhoto" src="" alt="">
          <div id="markers" class="markers"></div>
        </div>
        <p id="inspectText" class="inspect-text">写真内の注記対象を表示できます。</p>
      </section>

      <section class="panel" data-panel="notes">
        <h2>注記一覧</h2>
        <div id="notes" class="notes"></div>
      </section>

      <section class="panel" data-panel="docs">
        <h2>資料</h2>
        <div id="docs" class="docs"></div>
      </section>

      <section class="panel solve-panel" data-panel="solve">
        <h2>資料照会</h2>
        <div id="locks" class="locks"></div>
        <h2>情報公開請求用メモ</h2>
        <p class="small">写真帖と公開資料を見比べ、どの水門で、いつ、どのような説明のずれが残されたのかを整理してください。</p>
        <textarea id="finalAnswer" placeholder="例: G-4水門は17:55時点で..."></textarea>
        <button id="finalBtn" type="button">内容を整理</button>
        <p id="finalMsg"></p>
      </section>
    </aside>
  </main>
</div>

<div id="zoomModal" class="zoom-modal" aria-hidden="true">
  <div class="zoom-toolbar">
    <strong id="zoomTitle">写真</strong>
    <div class="zoom-actions">
      <button id="zoomOut" type="button">縮小</button>
      <button id="zoomReset" type="button">等倍</button>
      <button id="zoomIn" type="button">拡大</button>
      <button id="zoomClose" type="button">閉じる</button>
    </div>
  </div>
  <div id="zoomStage" class="zoom-stage">
    <img id="zoomImage" src="" alt="">
  </div>
</div>

<script src="app.js?v=20260530-separated-sites"></script>
</body>
</html>
