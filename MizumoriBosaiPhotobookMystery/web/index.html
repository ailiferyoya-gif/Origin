<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>水守町 防災写真帖</title>
<link rel="stylesheet" href="style.css?v=20260530-separated-sites">
</head>
<body>
<header class="site-header">
  <div class="wrap header-grid">
    <div>
      <p class="kicker">水守町 防災情報アーカイブ</p>
      <h1>水守町 防災写真帖</h1>
      <p class="lead">町内の河川、避難所、防災設備、広報掲示を記録した写真資料です。防災啓発、地域学習、施設点検の参考として公開しています。</p>
    </div>
    <nav class="site-nav" aria-label="関連ページ">
      <a href="./materials/">公開資料</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <section class="notice" aria-label="お知らせ">
    <strong>掲載内容</strong>
    <span>令和6年度の防災月間に合わせ、町内24地点の写真を再掲しました。写真は年代順ではなく、施設分類ごとに並べています。</span>
  </section>

  <section class="gallery-head">
    <div>
      <h2>写真一覧</h2>
      <p>写真を選択すると大きく表示できます。</p>
    </div>
    <p id="photoCount">24件</p>
  </section>

  <div id="photoGrid" class="photo-grid"></div>
</main>

<div id="photoModal" class="photo-modal" aria-hidden="true">
  <div class="modal-toolbar">
    <strong id="modalTitle">写真</strong>
    <div class="modal-actions">
      <button id="zoomOut" type="button">縮小</button>
      <button id="zoomReset" type="button">等倍</button>
      <button id="zoomIn" type="button">拡大</button>
      <button id="modalClose" type="button">閉じる</button>
    </div>
  </div>
  <div id="modalStage" class="modal-stage">
    <img id="modalImage" src="" alt="">
  </div>
  <p id="modalCaption" class="modal-caption"></p>
</div>

<footer class="footer wrap">
  <p>水守町 防災情報アーカイブ</p>
</footer>

<script src="photobook.js?v=20260530-separated-sites"></script>
</body>
</html>
