<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>雪島信号局記録 | 匿名依頼チャット</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <section class="case-pane" aria-label="調査資料">
      <header class="case-header">
        <p class="eyebrow">YUKISHIMA SIGNAL ARCHIVE / CASE SIG-0317</p>
        <h1>雪島信号局記録</h1>
        <p>地方紙の記者アカウントに届いた匿名依頼。公開記事、港湾資料、現地写真の差分から、2009年3月17日の避難遅延が「無事故」として処理された理由を追います。</p>
      </header>

      <div class="photo-card">
        <button class="photo-button" type="button" data-open-image>
          <img src="./assets/yukishima-signal-station.png" alt="雪島港の旧信号局。雨上がりの埠頭から信号塔と管理棟が見える。">
          <span>証拠写真を拡大</span>
        </button>
        <div>
          <p class="photo-label">匿名提供写真 / 撮影日不明</p>
          <p>公開写真では消えている青い灯りが、この写真では旧信号塔の上部に残っている。まずは資料と照合してください。</p>
        </div>
      </div>

      <nav class="tabs" aria-label="資料カテゴリ">
        <button type="button" class="tab active" data-tab="public">公開記事</button>
        <button type="button" class="tab" data-tab="records">港湾資料</button>
        <button type="button" class="tab" data-tab="notes">調査メモ</button>
      </nav>

      <section class="evidence-board" id="evidenceBoard" aria-live="polite"></section>
    </section>

    <section class="chat-pane" aria-label="匿名依頼チャット">
      <header class="chat-header">
        <div>
          <p>匿名の情報提供者</p>
          <strong>Signal_0317</strong>
        </div>
        <div class="timer" aria-label="プレイタイマー">
          <span id="timer">60:00</span>
          <small>想定 60分</small>
        </div>
      </header>

      <div class="progress-track" aria-label="進行状況">
        <span class="progress-dot active"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
      </div>

      <div class="messages" id="messages" aria-live="polite"></div>

      <form class="composer" id="answerForm">
        <label for="answerInput">返信する文言</label>
        <div>
          <input id="answerInput" type="text" autocomplete="off" placeholder="資料から見つけた言葉を送信">
          <button type="submit">送信</button>
        </div>
      </form>

      <div class="quick-actions">
        <button type="button" id="hintButton">ヒント</button>
        <button type="button" id="resetButton">最初から</button>
      </div>
    </section>
  </main>

  <dialog class="image-modal" id="imageModal">
    <button type="button" class="modal-close" data-close-image>閉じる</button>
    <img src="./assets/yukishima-signal-station.png" alt="雪島港の旧信号局を拡大表示">
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
