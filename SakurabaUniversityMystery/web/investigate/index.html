<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>20問調査 | 桜庭大学 研究棟 UNV-0415</title><link rel="stylesheet" href="../site.css"><script src="../site.js" defer></script></head>
<body class="investigation university" style="--case-bg:#181b28;--case-accent:#b8a2ff">
  <header class="case-top"><a href="../index.html">桜庭大学 研究棟</a><span>20問調査 / <b class="case-code">UNV-0415</b></span></header>
  <main class="investigate-main">
    <section class="investigate-head"><div><p class="eyebrow">QUESTION DOSSIER</p><h1>20問調査</h1><p>ここでは核心を直接出さず、公開資料から拾える違和感を順に確認します。</p></div><img src="../assets/hero.png" alt="桜庭大学 研究棟の資料画像"></section>




<section class="gimmick-panel" id="gimmick-questions">
  <p class="gimmick-kicker">GIMMICK CHECK</p>
  <h2>この調査で使う解き方</h2>
  <div class="gimmick-grid">
    <article class="gimmick-card"><strong>主役</strong><p>教室割と講義履修表で居場所を絞る</p></article>
    <article class="gimmick-card"><strong>補助</strong><p>学籍番号を学部棟と席番号に分解</p></article>
    <article class="gimmick-card"><strong>最終</strong><p>出席者ではなく、代返できた人物を特定</p></article>
  </div>
</section>
<form id="answerForm" class="question-list">
      <label class="q-card"><span>Q01</span><strong>主役ギミックで最初に変換すべき資料は何か。</strong><textarea name="q1" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q02</span><strong>同じ番号や時刻が別ページで別の意味になっていないか。</strong><textarea name="q2" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q03</span><strong>公式説明と食い違う更新履歴はどこに残っているか。</strong><textarea name="q3" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q04</span><strong>画像、図面、表、ログのうち、読む向きを変える資料はどれか。</strong><textarea name="q4" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q05</span><strong>補助ギミックの変換表として使える語や番号は何か。</strong><textarea name="q5" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q06</span><strong>空欄、欠番、未掲載、削除跡として扱うべき情報は何か。</strong><textarea name="q6" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q07</span><strong>人物の移動を制限する鍵、席、部屋、経路はどれか。</strong><textarea name="q7" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q08</span><strong>時刻順に並べると説明できなくなる記録はどれか。</strong><textarea name="q8" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q09</span><strong>同じ物品や資料が別名で扱われている箇所はどこか。</strong><textarea name="q9" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q10</span><strong>掲示板やメールにだけ残る主観的な違和感は何か。</strong><textarea name="q10" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q11</span><strong>主役ギミックを使うと新しく読める文字や場所は何か。</strong><textarea name="q11" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q12</span><strong>補助ギミックを使うと除外できる人物や資料は何か。</strong><textarea name="q12" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q13</span><strong>見えている証拠ではなく、見えない証拠として重要なものは何か。</strong><textarea name="q13" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q14</span><strong>最終問で答えに含めるべき人物は誰か。</strong><textarea name="q14" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q15</span><strong>最終問で答えに含めるべき場所や経路はどこか。</strong><textarea name="q15" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q16</span><strong>最終問で答えに含めるべき時刻や順番は何か。</strong><textarea name="q16" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q17</span><strong>最終問で答えに含めるべき手段は何か。</strong><textarea name="q17" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q18</span><strong>公式説明が最後まで隠している理由は何か。</strong><textarea name="q18" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q19</span><strong>全資料を重ねたとき、最後に残る矛盾は何か。</strong><textarea name="q19" rows="2" placeholder="メモを入力"></textarea></label>
      <label class="q-card"><span>Q20</span><strong>主役、補助、最終問ギミックを一文でつなぐとどうなるか。</strong><textarea name="q20" rows="2" placeholder="メモを入力"></textarea></label>
      <button type="submit">調査メモを確認する</button>
    </form>
    <div id="result" class="result-box" hidden></div>
  </main>
</body></html>
