    <h1>鍵の受け渡しは、ラック番号と返却欄で管理します。</h1>
    <p>夜間作業で使用された鍵と持ち出し品の控えです。保全台帳と受付控えで確認できる範囲のみ掲載しています。</p>
  </section>

  <section class="of-record">
    <h2>鍵台帳</h2>
    <table>
      <tr><th>RACK KEY</th><td>03:26 名取啓介。地下B列ラックの作業票に同じ番号を記録。</td></tr>
      <tr><th>TAPE CASE</th><td>銀色のテープケース。旧保管棚から持ち出し、翌朝の返却欄に追記。</td></tr>
      <tr><th>UPS ROOM</th><td>夜間入室。受付控えでは東側搬入口の閉鎖確認後に扱っています。</td></tr>
    </table>
    <p>返却欄だけ筆圧が異なるため、保全担当者が原票を確認中です。</p>
