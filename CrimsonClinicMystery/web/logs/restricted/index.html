<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>薬剤棚ログ | 記録保管室</title>
<link rel="stylesheet" href="../../site.css">
</head>
<body class="record-vault">
<header class="vault-header">
  <div><span>LOG-B / RESTRICTED</span><h1>薬剤棚ログ</h1></div>
  <nav><a href="../index.html">記録保管室</a><a href="../missing/index.html">欠落ログ</a></nav>
</header>
<main class="vault-doc">
  <section class="vault-panel vault-panel--locked">
    <p class="vault-kicker">RESTRICTED ACCESS COPY</p>
    <h2>管理画面参照ログ</h2>
    <p>管理画面から参照された制限ログです。このログ単独では犯行は確定しません。</p>
    <div class="log-table">
      <div><time>夜間カード</time><span>使用</span><p>通常の鍵ではなく、入退室履歴として残る。</p></div>
      <div><time>裏口廊下</time><span class="is-alert">閉鎖</span><p>第二処置室から出るための退路側。</p></div>
      <div><time>早瀬修</time><span class="is-missing">処理印</span><p>復旧後にまとめて処理された印影。</p></div>
    </div>
  </section>
  <section class="vault-note">
    <h2>照合メモ</h2>
    <p>薬剤棚ログは酸素バルブログと別管理です。二つを重ねると、事故報告書が隠したのは原因ではなく順路だったことが見えてきます。</p>
  </section>
</main>
<script src="../../textflow.js"></script>
</body>
</html>
