<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>酸素バルブログ | 記録保管室</title>
<link rel="stylesheet" href="../../site.css">
</head>
<body class="record-vault">
<header class="vault-header">
  <div><span>LOG-A / OPEN</span><h1>酸素バルブログ</h1></div>
  <nav><a href="../index.html">記録保管室</a><a href="../restricted/index.html">制限ログ</a></nav>
</header>
<main class="vault-doc">
  <section class="vault-panel">
    <p class="vault-kicker">EXTRACTED MEASUREMENT LOG</p>
    <h2>計測ログ抜粋</h2>
    <p>計測/業務ログの抜粋です。他サイトの時刻と重ねる必要があります。</p>
    <div class="log-table">
      <div><time>23:14</time><span class="is-alert">異常</span><p>酸素バルブ側の通知。処置記録より先に発生。</p></div>
      <div><time>00:02</time><span>復旧</span><p>復旧時刻だけが正常値として残る。</p></div>
      <div><time>欠番</time><span class="is-missing">空白扱い</span><p>通常値ではなく、番号ごと抜かれた処理。</p></div>
    </div>
  </section>
  <section class="vault-note">
    <h2>照合メモ</h2>
    <p>このログは事故原因を示しているように見えるが、薬剤棚ログと重ねると、隠された対象が酸素ではないことがわかる。</p>
  </section>
</main>
<script src="../../textflow.js"></script>
</body>
</html>
