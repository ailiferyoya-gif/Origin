    <h1>補助台帳</h1>
    <nav><a href="./daily/index.html">日次</a><a href="./audit/index.html">監査</a><a href="./discard/index.html">廃棄</a></nav>
  </div>
</header>
<main class="wrap section grid two">
  <section class="box">
    <h2>台帳概要</h2>
    <p>主台帳に載らない小さな控えをまとめたものです。検索結果には出にくい一方、メールに残る語と照合できます。</p>
    <table>
      <tr><th>控え</th><th>状態</th><th>照合語</th></tr>
      <tr><td>夜間カード</td><td>一部欠落</td><td>第二処置室 / 裏口廊下</td></tr>
      <tr><td>鍵札返却</td><td>記名なし</td><td>赤い鍵札</td></tr>
      <tr><td>薬剤棚</td><td>管理画面参照</td><td>薬剤棚ログ</td></tr>
      <tr><td>酸素バルブ</td><td>欠番</td><td>23:14 / 00:02</td></tr>
    </table>
  </section>
  <section class="box">
    <h2>監査メモ</h2>
    <p>欠けている記録は「未計測」ではなく「欠番」として扱われています。つまり、空白は偶然ではなく、番号ごと抜かれたものです。</p>
    <p>日次台帳、監査台帳、廃棄予定控えを順に見ると、事件後にどの記録が残され、どの記録が別の箱へ移されたかが見えます。</p>
  </section>
</main>
