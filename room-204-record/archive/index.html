<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KCT 素材保管庫</title>
  <link rel="stylesheet" href="archive.css">
</head>
<body>
  <header class="vault-hero">
    <img src="../assets/tape-vault-hero.png" alt="">
    <div>
      <p>KCT MATERIAL VAULT</p>
      <h1>素材保管庫</h1>
      <span>編集室3 / 磁気テープ台帳</span>
    </div>
  </header>

  <main>
    <section class="terminal">
      <h2>素材束照会</h2>
      <p>番組アーカイブと受信箱に残る制作番号を入力してください。</p>
      <form id="bundle-form">
        <input name="bundle" autocomplete="off" placeholder="KCT-0000-000">
        <button type="submit">OPEN</button>
      </form>
      <p id="bundle-message" class="message"></p>
    </section>

    <section id="bundle-panel" class="terminal hidden">
      <h2>Bundle: KCT-0417-204</h2>
      <ol class="tapes">
        <li><b>N-1913</b><span>北廊下 / 配管音</span></li>
        <li><b>W-2004</b><span>西階段 / 蛍光灯</span></li>
        <li><b>E-2131</b><span>東集会室 / 反響</span></li>
        <li><b>S-2240</b><span>南倉庫前 / 足音</span></li>
      </ol>
      <p>黒味前に戻す4カットの頭文字を続けて入力してください。</p>
      <form id="cut-form">
        <input name="order" autocomplete="off" placeholder="例: N...">
        <button type="submit">RESTORE</button>
      </form>
      <p id="cut-message" class="message"></p>
    </section>

    <section id="final-panel" class="terminal hidden">
      <h2>保管場所確認</h2>
      <p>黒味後の音声に残る「棚の奥」が示す場所を入力してください。</p>
      <form id="final-form">
        <input name="place" autocomplete="off" placeholder="場所名">
        <button type="submit">SUBMIT</button>
      </form>
      <p id="final-message" class="message"></p>
    </section>
  </main>

  <script src="archive.js"></script>
</body>
</html>
