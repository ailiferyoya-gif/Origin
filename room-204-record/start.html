<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>未公開素材 204号室の記録</title>
  <meta name="description" content="地方ケーブル局に残された未公開素材を復元する、仮想デスクトップ型モキュメンタリー調査。">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="desktop.css">
</head>
<body>
  <div class="desktop" id="desktop">
    <main class="desktop-space" aria-label="復元端末">
      <section class="desktop-icons" aria-label="端末アプリ">
        <button class="desktop-icon" data-open-browser="kct" type="button"><span>Br</span><b>Browser</b></button>
        <button class="desktop-icon icon-line" data-open-app="talk" type="button"><span>Li</span><b>LINE</b></button>
        <button class="desktop-icon" data-open-app="files" type="button"><span>Fl</span><b>Files</b></button>
        <button class="desktop-icon icon-google" data-open-app="search" type="button"><span>G</span><b>Google</b></button>
        <button class="desktop-icon icon-twitter" data-open-browser="social" type="button"><span>Tw</span><b>Twitter</b></button>
        <button class="desktop-icon" data-open-app="notes" type="button"><span>Nt</span><b>Notes</b></button>
      </section>
      <div class="window-layer" id="window-layer" aria-live="polite"></div>
    </main>

    <footer class="taskbar" aria-label="タスクバー">
      <div class="taskbar-center">
        <button class="start-button" data-open-app="notes" type="button" aria-label="復元ノート">□</button>
        <button class="taskbar-app" data-open-browser="kct" type="button">Browser</button>
        <button class="taskbar-app" data-open-app="talk" type="button">LINE</button>
        <button class="taskbar-app" data-open-app="files" type="button">Files</button>
        <button class="taskbar-app" data-open-app="search" type="button">Google</button>
        <button class="taskbar-app" data-open-browser="social" type="button">Twitter</button>
        <button class="taskbar-app" data-open-app="notes" type="button">Notes</button>
      </div>
      <div class="taskbar-right">
        <span id="notice">復元端末を起動しました</span>
        <time id="clock">--:--</time>
      </div>
    </footer>

    <div class="toast-stack" id="toast-stack" aria-live="polite"></div>
  </div>
  <script src="desktop.js"></script>
</body>
</html>
