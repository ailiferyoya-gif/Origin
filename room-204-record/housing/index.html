<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>かすみ野団地 管理室</title>
  <link rel="stylesheet" href="housing.css">
</head>
<body>
  <header class="top">
    <div>
      <p>かすみ野団地 管理室</p>
      <h1>掲示記録・鍵貸出照会</h1>
    </div>
  </header>

  <figure class="photo">
    <img src="../assets/housing-office-hero.png" alt="">
  </figure>

  <main>
    <section class="notice">
      <h2>照会番号</h2>
      <p>掲示記録は、記録日4桁で照会できます。制作班へ渡した写しと、管理室控えの内容が異なる場合があります。</p>
      <form id="unlock-form">
        <input name="code" autocomplete="off" placeholder="例: 0417">
        <button type="submit">照会</button>
      </form>
      <p id="form-message" class="message"></p>
    </section>

    <section id="record" class="record hidden">
      <h2>04/17 管理室控え</h2>
      <table>
        <thead><tr><th>時刻</th><th>場所</th><th>記録</th></tr></thead>
        <tbody>
          <tr><td>19:13</td><td>北廊下</td><td>配管スペース付近で水音。作業予定なし。</td></tr>
          <tr><td>20:04</td><td>西階段</td><td>蛍光灯交換。点滅のため再確認。</td></tr>
          <tr><td>21:31</td><td>東集会室</td><td>反響確認。KCT班へ一時貸出。</td></tr>
          <tr><td>22:40</td><td>南倉庫前</td><td>聞き取り再録。倉庫前で足音停止。</td></tr>
        </tbody>
      </table>
      <aside>
        <h3>鍵貸出控え</h3>
        <p>北棟倉庫Bの鍵は翌朝、管理室ポストで確認。棚下段奥にラベルなしの黒ケースあり。</p>
      </aside>
    </section>
  </main>

  <script src="housing.js"></script>
</body>
</html>
